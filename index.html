<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NZP Roster</title>

    <!-- Social Preview -->
    <meta property="og:title" content="NZP Roster">
    <meta property="og:description" content="Official NZP Duty Roster">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">

    <style>
        body {
            margin: 0;
            /* Deep, dark blue gradient matching a police operations theme */
            background: linear-gradient(135deg, #060d1a 0%, #0c1a33 100%);
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            /* Matches the dark charcoal color from the logo image for a seamless look */
            background: #1f2326; 
            padding: 50px;
            border-radius: 16px;
            text-align: center;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        img {
            width: 130px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px; /* Slightly rounds corners if needed */
        }

        h1 {
            margin: 0;
            font-size: 34px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            /* Smooth animations */
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        a:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.4);
        }
        
        a:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

<div class="card">

    <!-- Ensure your image file is named logo.png in GitHub -->
    <img src="logo.png" alt="NZP Crest">

    <h1>NZP Roster</h1>

    <p>
        Official Duty Roster<br>
        Click below to access the live database.
    </p>

    <a href="https://airtable.com/appCMbEyQrfqRxuAW/shrmuzNQvVPkYD7Ln">
        Open Roster
    </a>

</div>

</body>
</html>
