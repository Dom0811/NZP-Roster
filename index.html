<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NZP Roster</title>

    <!-- Social Preview (Discord Embed) -->
    <meta property="og:title" content="NZP Roster">
    <meta property="og:description" content="Official NZP Duty Roster">
    <!-- Points directly to your nzp.png file on GitHub Pages -->
    <meta property="og:image" content="https://dom0811.github.io/NZP-Roster/nzp.png">
    <meta property="og:type" content="website">
    
    <!-- Forces Discord to display the image as a large, beautiful card -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #060d1a 0%, #0c1a33 100%);
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .card {
            background: #1f2326; 
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .crest-logo {
            width: 110px;
            height: auto;
            margin-bottom: 10px;
        }

        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        a:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.4);
        }
        
        a:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

<div class="card">

    <!-- 1. The Crest Logo at the top -->
    <img src="logo.png" alt="NZP Crest" class="crest-logo">

    <h1>NZP Roster</h1>

    <!-- 2. The Roblox Police Banner Image in the middle -->
    <img src="police.png" alt="NZP Team Banner" class="banner-img">

    <p>
        Official Duty Roster<br>
        Click below to access the live database.
    </p>

    <a href="https://airtable.com/appCMbEyQrfqRxuAW/shrmuzNQvVPkYD7Ln">
        Open Roster
    </a>

</div>

</body>
</html>
