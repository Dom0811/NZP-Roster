<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NZP Roster</title>

    <!-- Social Preview -->
    <meta property="og:title" content="NZP Roster">
    <meta property="og:description" content="Official NZP Duty Roster">
    <meta property="og:image" content="https://YOURDOMAIN.com/logo.png">
    <meta property="og:type" content="website">

    <style>
        body{
            margin:0;
            background:#0f172a;
            color:white;
            font-family:Arial,Helvetica,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#1e293b;
            padding:50px;
            border-radius:15px;
            text-align:center;
            width:420px;
            box-shadow:0 0 25px rgba(0,0,0,.4);
        }

        img{
            width:120px;
            margin-bottom:20px;
        }

        h1{
            margin:0;
            font-size:36px;
        }

        p{
            color:#cbd5e1;
        }

        a{
            display:inline-block;
            margin-top:25px;
            background:#2563eb;
            color:white;
            padding:15px 35px;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="card">

    <img src="logo.png" alt="NZP">

    <h1>NZP Roster</h1>

    <p>
        Official Duty Roster<br>
        Click below to access the live roster.
    </p>

    <a href="https://airtable.com/appCMbEyQrfqRxuAW/shrmuzNQvVPkYD7Ln">
        Open Roster
    </a>

</div>

</body>
</html>
